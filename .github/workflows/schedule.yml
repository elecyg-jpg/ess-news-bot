name: News Summary Bot

on:
  schedule:
    # GitHub Actions 예약 실행은 UTC 기준입니다.
    # 한국시간(KST) 오전 08:00 = UTC 전날 23:00
    - cron: "0 23 * * *"

    # 한국시간(KST) 낮 12:00 = UTC 03:00
    - cron: "0 3 * * *"

    # 한국시간(KST) 오후 18:00 = UTC 09:00
    - cron: "0 9 * * *"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: news-summary-bot
  cancel-in-progress: false

jobs:
  run-bot:
    name: 뉴스 수집 및 텔레그램 전송
    runs-on: ubuntu-latest

    # 최대 15개 뉴스 주제를 처리하므로 실행 여유시간 확대
    timeout-minutes: 30

    steps:
      - name: 저장소 코드 불러오기
        uses: actions/checkout@v6

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: 파이썬 및 pip 버전 확인
        run: |
          python --version
          python -m pip --version

      - name: 필요한 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 파이썬 스크립트 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          # 중복 제거 후 최종 전송할 뉴스 주제 수
          MAX_TOPICS: "15"

          # 유사 기사 판별 전에 수집할 Google News 후보 기사 수
          MAX_CANDIDATES: "80"

          # 동일 보도 주제에서 대표 원문 확보를 시도할 최대 매체 수
          MAX_CLUSTER_FETCH: "3"

          PYTHONUNBUFFERED: "1"
          TZ: Asia/Seoul
        run: |
          python main.py
