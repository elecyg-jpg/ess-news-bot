name: News Summary Bot

on:
  schedule:
    # GitHub Actions 예약 실행은 UTC 기준입니다.
    # 한국시간(KST) 오전 08:00 = UTC 전날 23:00
    - cron: "0 23 * * *"

    # 한국시간(KST) 낮 12:00 = UTC 03:00
    - cron: "0 3 * * *"

    # 한국시간(KST) 오후 18:00 = UTC 09:00
    - cron: "0 9 * * *"

  # GitHub Actions 화면에서 수동 실행 버튼 활성화
  workflow_dispatch:

# 저장소 코드를 읽는 최소 권한만 부여
permissions:
  contents: read

# 이전 실행이 끝나기 전에 다음 실행이 시작되면 중복 실행 방지
concurrency:
  group: news-summary-bot
  cancel-in-progress: false

jobs:
  run-bot:
    name: 뉴스 수집 및 텔레그램 전송
    runs-on: ubuntu-latest

    # 크롤링 또는 API 응답 지연으로 무한 실행되는 상황 방지
    timeout-minutes: 20

    steps:
      - name: 저장소 코드 불러오기
        uses: actions/checkout@v6

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: 파이썬 및 pip 버전 확인
        run: |
          python --version
          python -m pip --version

      - name: 필요한 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 파이썬 스크립트 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Seoul
        run: |
          python main.py
